<!-- Império Global — assinatura principal (fundo claro).
     RECRIAÇÃO FIEL ao manual de marca (cores/estrutura oficiais).
     TODO: substituir pelo ficheiro vetorial oficial (imperio_primary.svg) quando disponibilizado.
     Não distorcer, recolorir, rodar nem aplicar sombras. Respeitar área de proteção. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 84" role="img" aria-label="Império Global — Excellence in Telecommunications">
  <defs>
    <linearGradient id="xg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0072CE"/><stop offset="1" stop-color="#7Fc0f2"/>
    </linearGradient>
  </defs>

  <!-- Globo wireframe -->
  <g fill="none" stroke="#013F80" stroke-width="1.6">
    <circle cx="42" cy="40" r="30"/>
    <ellipse cx="42" cy="40" rx="20" ry="30"/>
    <ellipse cx="42" cy="40" rx="9" ry="30"/>
    <line x1="42" y1="10" x2="42" y2="70"/>
    <line x1="16" y1="25" x2="68" y2="25"/>
    <line x1="12" y1="40" x2="72" y2="40"/>
    <line x1="16" y1="55" x2="68" y2="55"/>
  </g>
  <!-- Fibra ótica (detalhe) -->
  <g fill="none" stroke="#0072CE" stroke-width="1.5" stroke-linecap="round">
    <path d="M50 58 Q60 60 67 57"/><path d="M49 61 Q58 65 65 64"/><path d="M47 63 Q53 68 60 69"/>
  </g>
  <g fill="#0072CE"><circle cx="67" cy="57" r="1.4"/><circle cx="65" cy="64" r="1.4"/><circle cx="60" cy="69" r="1.4"/></g>

  <!-- Marca nominativa -->
  <text x="92" y="44" font-family="Archivo, 'Arial Narrow', sans-serif" font-weight="700" font-size="34" fill="#013F80" letter-spacing="0.5">IMPÉRIO</text>
  <text x="176" y="61" font-family="Archivo, 'Arial Narrow', sans-serif" font-weight="700" font-size="19" fill="#2C2E5A" letter-spacing="3">GLOBAL</text>
  <text x="93" y="77" font-family="Inter, sans-serif" font-weight="600" font-size="12.5" fill="#0072CE" letter-spacing="0.3">Excellence in Telecommunications</text>

  <!-- Elemento «X» -->
  <g transform="translate(300,40)">
    <g stroke="url(#xg)" stroke-width="10" stroke-linecap="round" fill="none">
      <line x1="-26" y1="-22" x2="26" y2="22"/>
      <line x1="26" y1="-22" x2="-26" y2="22"/>
    </g>
    <g stroke="#013F80" stroke-width="2" stroke-linecap="round" fill="none" opacity=".55">
      <line x1="-26" y1="-22" x2="26" y2="22"/>
      <line x1="26" y1="-22" x2="-26" y2="22"/>
    </g>
  </g>
</svg>
